# nginx config for the static frontend container.
#
# - Listens on 8080 (so nginx can run as non-root)
# - SPA fallback: unknown paths get index.html
# - Hash-named assets cached for a year (Nasti emits content hashes in /assets)
# - index.html / sw.js never cached
# - gzip enabled (Nasti also writes .gz pre-compressed; we serve those when
#   present via gzip_static)

server {
    listen 8080;
    server_name _;
    root /app/dist;
    index index.html;

    # Pre-compressed assets — much cheaper than per-request gzipping
    gzip_static on;
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hash-named assets — fingerprinted so safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Service worker + manifest must not be cached, or PWA updates stall
    location = /sw.js              { add_header Cache-Control "no-cache"; }
    location = /manifest.json      { add_header Cache-Control "no-cache"; }
    location = /index.html         { add_header Cache-Control "no-cache"; }

    # Health probe target
    location = /_healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
