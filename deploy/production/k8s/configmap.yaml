apiVersion: v1
kind: ConfigMap
metadata:
  name: wuling-config
  namespace: wuling
data:
  WULING_ENV: "prod"
  WULING_HTTP_ADDR: ":8080"
  WULING_LOG_FORMAT: "json"
  WULING_LOG_LEVEL: "info"
  WULING_REPO_ROOT: "/var/lib/wuling/repos"
  WULING_SSH_ENABLED: "true"
  WULING_SSH_ADDR: ":2222"
  WULING_SSH_HOST_KEY: "/var/lib/wuling/ssh/host_ed25519"
  # The domain the frontend is served on (used to filter CORS).
  # MUST be overridden per environment via a kustomize overlay (or `kustomize
  # edit add configmap ... --from-literal=WULING_HTTP_CORS_ORIGINS=...`) before
  # `kubectl apply`. Leaving the placeholder will block every real frontend.
  WULING_HTTP_CORS_ORIGINS: "https://CHANGE_ME.example.com"
  WULING_JWT_ISSUER: "wuling-devops"
  WULING_JWT_AUDIENCE: "wuling-devops"
  WULING_JWT_TTL: "24h"
