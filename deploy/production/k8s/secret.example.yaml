# Example — copy to secret.yaml, fill in real values, and DO NOT COMMIT.
# In real life prefer SealedSecret / external-secrets / sops-secrets-operator.

apiVersion: v1
kind: Secret
metadata:
  name: wuling-secrets
  namespace: wuling
type: Opaque
stringData:
  # openssl rand -hex 48
  WULING_JWT_SECRET: "REPLACE_ME"
  # The full DSN — keep the password in here only, not in ConfigMap
  WULING_DB_DSN: "postgres://wuling:REPLACE_ME@wuling-postgres.wuling.svc.cluster.local:5432/wuling?sslmode=disable"

---
apiVersion: v1
kind: Secret
metadata:
  name: wuling-postgres-secret
  namespace: wuling
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME"
