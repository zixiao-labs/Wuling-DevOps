# Example — copy to secret.yaml, fill in real values, and DO NOT COMMIT.
# In real life prefer SealedSecret / external-secrets / sops-secrets-operator.

apiVersion: v1
kind: Secret
metadata:
  name: wuling-secrets
  namespace: wuling
type: Opaque
stringData:
  # openssl rand -hex 48
  WULING_JWT_SECRET: "REPLACE_ME"
  # openssl rand -hex 32 — signs the OAuth tokens / auth-codes we issue from
  # the provider role (Esperanta desktop, future first-party clients). Plaintext
  # never hits the DB, only its HMAC does, so rotating this nukes all live
  # provider-issued sessions.
  WULING_OAUTH_HMAC_SECRET: "REPLACE_ME"
  # The full DSN — keep the password in here only, not in ConfigMap.
  # sslmode=require enforces TLS on the wire; switch to verify-full and set
  # PGSSLROOTCERT (or the equivalent client cert vars) once you've provisioned
  # a CA for the Postgres StatefulSet.
  WULING_DB_DSN: "postgres://wuling:REPLACE_ME@wuling-postgres.wuling.svc.cluster.local:5432/wuling?sslmode=require"

---
apiVersion: v1
kind: Secret
metadata:
  name: wuling-postgres-secret
  namespace: wuling
type: Opaque
stringData:
  POSTGRES_PASSWORD: "REPLACE_ME"
