apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wuling-postgres
  namespace: wuling
spec:
  serviceName: wuling-postgres
  replicas: 1
  selector:
    matchLabels:
      app: wuling-postgres
  template:
    metadata:
      labels:
        app: wuling-postgres
    spec:
      securityContext:
        fsGroup: 999  # postgres in the official image
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: postgres
          image: postgres:18-alpine
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 999
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: wuling
            - name: POSTGRES_DB
              value: wuling
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wuling-postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: data
              # postgres:18+ wants /var/lib/postgresql, not /var/lib/postgresql/data
              mountPath: /var/lib/postgresql
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /var/run/postgresql
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "wuling", "-d", "wuling"]
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "wuling", "-d", "wuling"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: tmp
          emptyDir: {}
        - name: run
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: wuling-postgres
  namespace: wuling
spec:
  clusterIP: None
  selector:
    app: wuling-postgres
  ports:
    - port: 5432
      name: postgres
