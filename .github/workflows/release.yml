name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # to create the GitHub Release & upload artifacts
  packages: write # to push images to ghcr.io
  id-token: write # for cosign / OIDC if/when we add signing

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Cross-compile the two Go binaries for the platforms we publish.
  # ─────────────────────────────────────────────────────────────────────────
  build-binaries:
    name: Build ${{ matrix.os }}/${{ matrix.arch }} binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, runner: ubuntu-latest }
          - { os: linux, arch: arm64, runner: ubuntu-24.04-arm }
          - { os: darwin, arch: amd64, runner: macos-15-intel }
          - { os: darwin, arch: arm64, runner: macos-14 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      # libgit2 is a cgo dep. On Linux runners we need apt; on macOS we use brew.
      # Each linux arch builds on its own native runner (ubuntu-latest for amd64,
      # ubuntu-24.04-arm for arm64), so no cross-compile toolchain is needed.
      - name: Install libgit2 (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgit2-dev pkg-config build-essential

      - name: Install libgit2 (macOS)
        if: matrix.os == 'darwin'
        run: brew install libgit2 pkg-config

      - name: Build binaries
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "1"
        run: |
          mkdir -p out
          VERSION="${GITHUB_REF_NAME}"
          # -trimpath strips local paths; -s -w strips symbol & debug info
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o "out/wuling-api-${{ matrix.os }}-${{ matrix.arch }}"     ./cmd/wuling-api
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o "out/wuling-migrate-${{ matrix.os }}-${{ matrix.arch }}" ./cmd/wuling-migrate

      - name: Compress + checksum
        run: |
          cd out
          for f in wuling-api-* wuling-migrate-*; do
            tar -czf "${f}.tar.gz" "${f}"
            sha256sum "${f}.tar.gz" > "${f}.tar.gz.sha256" || shasum -a 256 "${f}.tar.gz" > "${f}.tar.gz.sha256"
            rm "${f}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: out/*
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Frontend bundle.
  # ─────────────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build frontend bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install + build
        working-directory: frontend
        run: |
          npm ci
          npm run api:types
          npm run build

      - name: Tar + checksum
        run: |
          tar -czf "wuling-frontend-dist-${GITHUB_REF_NAME}.tar.gz" -C frontend/dist .
          sha256sum "wuling-frontend-dist-${GITHUB_REF_NAME}.tar.gz" > "wuling-frontend-dist-${GITHUB_REF_NAME}.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: |
            wuling-frontend-dist-*.tar.gz
            wuling-frontend-dist-*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Docker images for ghcr.io.
  # ─────────────────────────────────────────────────────────────────────────
  build-images:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [build-frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Metadata: produce tags like v0.2.0 + sha-abcd123
      - name: Compute tags
        id: meta
        run: |
          v="${GITHUB_REF_NAME}"   # e.g. v0.2.0
          echo "version=${v}" >> "$GITHUB_OUTPUT"
          echo "sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wuling-api:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/wuling-api:latest
            ghcr.io/${{ github.repository_owner }}/wuling-api:sha-${{ steps.meta.outputs.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/production/Dockerfile.frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/wuling-frontend:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/wuling-frontend:latest
            ghcr.io/${{ github.repository_owner }}/wuling-frontend:sha-${{ steps.meta.outputs.sha }}

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Nix flake check (cheap smoke test that the flake still builds).
  # ─────────────────────────────────────────────────────────────────────────
  nix-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - run: nix --extra-experimental-features 'nix-command flakes' flake check --no-build

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Publish the GitHub Release with all the artifacts attached.
  # ─────────────────────────────────────────────────────────────────────────
  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-frontend, build-images, nix-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release/
          merge-multiple: true
          # Skip the auto-generated *.dockerbuild build-record artifacts that
          # docker/build-push-action uploads; we only want the release bundles.
          pattern: "@(binaries-*|frontend-dist)"

      - name: Verify checksums
        run: |
          cd release
          ls -la
          # Each artifact ships its own .sha256 — verify them all.
          for f in *.sha256; do
            ( cd "$(dirname "$f")" && sha256sum -c "$(basename "$f")" )
          done

      - name: Build release notes
        id: notes
        run: |
          cat > NOTES.md <<EOF
          ## Wuling DevOps ${GITHUB_REF_NAME}

          ### Container images

          - \`ghcr.io/${{ github.repository_owner }}/wuling-api:${GITHUB_REF_NAME}\`
          - \`ghcr.io/${{ github.repository_owner }}/wuling-frontend:${GITHUB_REF_NAME}\`

          ### Binaries

          Each platform is shipped as a \`.tar.gz\` with an adjacent
          \`.sha256\` checksum file. Verify with:

          \`\`\`
          sha256sum -c wuling-api-linux-amd64.tar.gz.sha256
          \`\`\`

          ### Frontend

          - \`wuling-frontend-dist-${GITHUB_REF_NAME}.tar.gz\` — Nasti build
            output, ready to drop into a CDN or static-file server.

          ### Nix

          \`\`\`
          nix build github:zixiao-labs/Wuling-DevOps/${GITHUB_REF_NAME}#wuling-api
          \`\`\`

          See \`deploy/production/README.md\` for full upgrade instructions.
          EOF

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.SYNC_PAT }}
          body_path: NOTES.md
          files: |
            release/*.tar.gz
            release/*.sha256
          fail_on_unmatched_files: true
          generate_release_notes: true
  # ─────────────────────────────────────────────────────────────────────────
  # 6. Deploy to the official production server (ECS).
  #
  # Reproduces the manual upgrade flow from deploy/production/README.md §3.3:
  # rsync the prod compose stack, write .env from the ENV_FILE secret with
  # WULING_TAG pinned to this release, then pull → migrate → restart.
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to official production
    needs: [publish-release]
    environment: production
    runs-on: ubuntu-latest
    env:
      SSH_HOST: ${{ secrets.ECS_HOST }}
      SSH_USER: ${{ secrets.ECS_USER }}
      # Sub-path under the SSH user's $HOME on the server. We deliberately
      # do NOT use /opt or /srv: the snap-packaged `docker` (default on recent
      # Ubuntu / many cloud images) is confined to $HOME by AppArmor and
      # cannot read files outside it — symptoms look like
      #   open /var/lib/snapd/void/docker-compose.prod.yml: no such file
      # If you're on apt-packaged docker (docker-ce / docker.io) and want a
      # system path, switch this to an absolute path and drop the resolve step.
      DEPLOY_SUBDIR: wuling-prod
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH key + known_hosts
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.ECS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Resolve absolute deploy dir on server
        run: |
          # `cd && pwd` gives us the absolute path after $HOME / tilde expansion
          # on the remote — keeps the path portable across users whose home
          # isn't /home/<user> (e.g. Amazon Linux uses /home/ec2-user).
          DIR=$(ssh "$SSH_USER@$SSH_HOST" \
            "mkdir -p \"\$HOME/$DEPLOY_SUBDIR\" && cd \"\$HOME/$DEPLOY_SUBDIR\" && pwd")
          echo "Resolved DEPLOY_DIR=$DIR"
          echo "DEPLOY_DIR=$DIR" >> "$GITHUB_ENV"

      - name: Stage .env from ENV_FILE secret
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          printf '%s\n' "$ENV_FILE" > .env.deploy
          # Pin WULING_TAG to this release. Drop any pre-set value so the
          # secret can never override the release tag by accident.
          sed -i '/^WULING_TAG=/d' .env.deploy
          echo "WULING_TAG=${GITHUB_REF_NAME}" >> .env.deploy

      - name: Sync compose stack to server
        run: |
          ssh "$SSH_USER@$SSH_HOST" "mkdir -p '$DEPLOY_DIR'"
          rsync -avz \
            deploy/production/docker-compose.prod.yml \
            deploy/production/Caddyfile \
            deploy/production/postgres \
            "$SSH_USER@$SSH_HOST:$DEPLOY_DIR/"
          # Atomic .env replace: upload to .env.new, then rename in one step.
          scp .env.deploy "$SSH_USER@$SSH_HOST:$DEPLOY_DIR/.env.new"
          ssh "$SSH_USER@$SSH_HOST" \
            "mv '$DEPLOY_DIR/.env.new' '$DEPLOY_DIR/.env' && chmod 600 '$DEPLOY_DIR/.env'"

      - name: Pull, migrate, restart
        run: |
          ssh "$SSH_USER@$SSH_HOST" bash -se <<EOF
          set -euo pipefail
          cd "$DEPLOY_DIR"
          echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io \
            -u '${{ github.repository_owner }}' --password-stdin
          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml run --rm api wuling-migrate
          docker compose -f docker-compose.prod.yml up -d
          # Wait up to ~60s for /healthz inside the api container.
          for i in 1 2 3 4 5 6; do
            if docker compose -f docker-compose.prod.yml exec -T api \
                 wget -qO- http://localhost:8080/healthz; then
              echo
              echo "deploy OK: ${{ github.ref_name }}"
              exit 0
            fi
            echo "healthz not ready (\$i/6), retrying in 10s..."
            sleep 10
          done
          echo "healthz never came up — dumping diagnostics" >&2
          docker compose -f docker-compose.prod.yml ps
          docker compose -f docker-compose.prod.yml logs --tail=80 api
          exit 1
          EOF
