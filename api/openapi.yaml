openapi: 3.1.0
info:
  title: Wuling DevOps API
  version: 0.1.0-stage1
  description: |
    Stage 1 of the Wuling DevOps platform.

    What's implemented:
      - Auth (register, login, /me, personal access tokens, SSH public keys)
      - Orgs and Projects (CRUD)
      - Repositories (CRUD + libgit2-backed read APIs)
      - Git smart HTTP (clone/fetch/push) and Git over SSH (default :2222)
      - Issues (CRUD, labels, comments, assignees)
      - Merge Requests (open/diff/merge with FF/merge-commit/squash, comments, reviews)
      - Wiki (per-project Markdown pages backed by a separate Git repo)
      - Insights (per-project activity, contributors, language stats)

    Planned for later stages (URLs reserved, not yet served):
      - Pipelines

    All errors use the JSON envelope:
      { "error": { "code": "<stable_code>", "message": "<human msg>", "details": {} } }

servers:
  - url: http://localhost:8080
    description: Local dev

security:
  - bearerAuth: []

paths:
  /healthz:
    get:
      summary: Liveness + DB health check
      security: []
      responses:
        "200": { description: ok }
        "503": { description: unavailable }

  /version:
    get:
      summary: Version metadata
      security: []
      responses:
        "200":
          description: ok

  # ---------------- auth ----------------

  /api/v1/auth/register:
    post:
      summary: Create an account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201":
          description: account created and immediately usable (response includes a fresh JWT)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "202":
          description: |
            account created but awaiting admin approval — no JWT is issued.
            Returned when `WULING_AUTH_REQUIRE_APPROVAL=true` (the default).
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PendingAccountResponse" }
        "409": { $ref: "#/components/responses/ConflictError" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /api/v1/auth/login:
    post:
      summary: Exchange username/password for a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TokenResponse" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403":
          description: account pending approval or rejected
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/oauth/github/start:
    get:
      summary: Begin the GitHub OAuth login flow
      description: |
        302-redirects the browser to GitHub's `/authorize` endpoint with
        state + PKCE, after dropping a short-lived signed HttpOnly cookie that
        the callback handler validates. Must be hit via a top-level browser
        navigation (the redirect can't follow XHR).
      security: []
      parameters:
        - in: query
          name: return_to
          required: false
          schema: { type: string }
          description: Path on the frontend to navigate to after a successful login. Echoed back in the callback fragment.
      responses:
        "302": { description: redirect to GitHub }
        "503":
          description: GitHub OAuth not configured on this server
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/v1/auth/oauth/github/callback:
    get:
      summary: Complete the GitHub OAuth login flow
      description: |
        Exchanges the authorization code for a GitHub access token using the
        PKCE verifier stashed in the state cookie, then either logs an existing
        user in, creates a brand-new local account, or redirects to the
        `/oauth/confirm-link` page when the GitHub email matches a local
        account that isn't yet linked. Result is communicated to the SPA via
        the URL fragment on a 302 to `<frontend>/oauth/callback`.
      security: []
      parameters:
        - in: query
          name: code
          required: true
          schema: { type: string }
        - in: query
          name: state
          required: true
          schema: { type: string }
      responses:
        "302":
          description: |
            Browser bounce to the frontend. The URL fragment carries one of:
              - `access_token=...&expires_at=...` on success
              - `pending_approval=1&status=pending` if approval is required
              - `error=...&error_description=...` on failure
            When the email matches an existing account a 302 to
            `<frontend>/oauth/confirm-link` is issued instead (no fragment;
            the pending state lives in a signed cookie).

  /api/v1/auth/oauth/github/confirm:
    post:
      summary: Confirm a GitHub OAuth account-link decision
      description: |
        Called from `/oauth/confirm-link` after the user picks "link" (merge
        the GitHub identity onto the existing local account) or "new" (create
        a fresh account, ignoring the email collision).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, enum: [link, new] }
      responses:
        "200":
          description: linked or created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthConfirmResponse" }
        "202":
          description: linked/created but awaiting approval
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PendingAccountResponse" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /api/v1/auth/me:
    get:
      summary: Return the authenticated user
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }

  /api/v1/auth/tokens:
    get:
      summary: List the caller's personal access tokens
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    maxItems: 100
                    items: { $ref: "#/components/schemas/AccessTokenView" }
    post:
      summary: Create a new personal access token (raw value returned ONCE)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 64 }
                scopes:
                  type: array
                  maxItems: 10
                  items: { type: string, enum: [repo:read, repo:write] }
                expires_at: { type: string, format: date-time }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AccessTokenView" }

  /api/v1/auth/tokens/{token_id}:
    delete:
      summary: Revoke a PAT
      parameters:
        - in: path
          name: token_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------- avatars ----------------

  /api/v1/auth/avatar:
    put:
      summary: Upload or replace the caller's avatar
      description: |
        Body is a multipart/form-data with a single `avatar` file field. The
        server decodes the upload (PNG/JPEG/GIF only), centre-crops to a
        square, resizes to 256×256, and re-encodes as PNG. Max body size is
        2 MiB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AvatarUploadResponse" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
    delete:
      summary: Remove the caller's uploaded avatar
      responses:
        "204": { description: removed }
        "401": { $ref: "#/components/responses/UnauthorizedError" }

  /api/v1/users/{username}/avatar:
    get:
      summary: Public PNG of a user's avatar
      description: |
        Streams the user's uploaded PNG. Returns 404 when the user has not
        uploaded one — frontends should fall back to a deterministic initials
        tile. Response is cacheable for an hour against the query string in
        User.avatar_url.
      security: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
        - in: query
          name: v
          schema: { type: integer }
          description: Cache-buster (Unix seconds). Ignored by the server.
      responses:
        "200":
          description: ok
          content:
            image/png: {}
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------- org members ----------------

  /api/v1/orgs/{org_slug}/members:
    get:
      summary: List members of an org
      parameters:
        - in: path
          name: org_slug
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  members:
                    type: array
                    items: { $ref: "#/components/schemas/OrgMember" }
                  role:
                    $ref: "#/components/schemas/OrgRole"
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/members/{user_id}:
    patch:
      summary: Change a member's role
      description: |
        Owners may grant any role including owner. Maintainers may grant
        developer/reporter/guest but never maintainer/owner. Demoting the
        last owner is refused (409).
      parameters:
        - in: path
          name: org_slug
          required: true
          schema: { type: string }
        - in: path
          name: user_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchMemberRequest" }
      responses:
        "204": { description: updated }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409":
          description: Conflict — for example, refusing to demote the last owner.
    delete:
      summary: Remove a member from an org (or self-leave)
      description: |
        Self-leave (user_id == caller) is permitted regardless of role,
        subject to the last-owner guard. Removing another member requires
        manage-members permission and a strictly higher rank than the target.
      parameters:
        - in: path
          name: org_slug
          required: true
          schema: { type: string }
        - in: path
          name: user_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: removed }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409":
          description: Conflict — last owner cannot leave.

  # ---------------- invitations ----------------

  /api/v1/orgs/{org_slug}/invitations:
    get:
      summary: List invitations for an org
      parameters:
        - in: path
          name: org_slug
          required: true
          schema: { type: string }
        - in: query
          name: status
          schema: { $ref: "#/components/schemas/InvitationStatus" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitations:
                    type: array
                    items: { $ref: "#/components/schemas/OrgInvitation" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
    post:
      summary: Create a magic-link invitation
      parameters:
        - in: path
          name: org_slug
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateInvitationRequest" }
      responses:
        "201":
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  invitation: { $ref: "#/components/schemas/OrgInvitation" }
                  url:
                    type: string
                    description: Convenience copy of invitation.url.
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "409":
          description: Conflict — pending invitation already exists, or user is already a member.

  /api/v1/orgs/{org_slug}/invitations/{invitation_id}:
    delete:
      summary: Revoke a pending invitation
      parameters:
        - in: path
          name: org_slug
          required: true
          schema: { type: string }
        - in: path
          name: invitation_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: revoked }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/invitations/{token}:
    get:
      summary: Preview an invitation by its share token
      description: |
        Returns org name, role, expiry, and status. Identity match is NOT
        enforced on preview so the recipient can see why a link doesn't work
        for them. Acceptance (POST /accept) does enforce the match.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgInvitation" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/invitations/{token}/accept:
    post:
      summary: Accept an invitation
      description: |
        Adds the caller to the org with the role embedded in the invitation
        and flips status to 'accepted'. Refuses (403) if the invitation
        belongs to a different user_id or email address than the caller.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OrgInvitation" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409":
          description: Conflict — invitation already accepted, revoked, or expired.

  /api/v1/auth/ssh-keys:
    get:
      summary: List the caller's registered SSH public keys
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  ssh_keys:
                    type: array
                    maxItems: 100
                    items: { $ref: "#/components/schemas/SSHKey" }
    post:
      summary: Register an SSH public key (used by the embedded Git-over-SSH server)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateSSHKeyRequest" }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/SSHKey" } } }
        "409": { $ref: "#/components/responses/ConflictError" }
        "400": { $ref: "#/components/responses/ValidationError" }

  /api/v1/auth/ssh-keys/{key_id}:
    delete:
      summary: Revoke a registered SSH key
      parameters:
        - in: path
          name: key_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------------------------------------------------------------------
  # OAuth Provider role (Wuling-DevOps issuing tokens to other apps).
  # ---------------------------------------------------------------------------
  /.well-known/wuling-clients:
    get:
      security: []
      summary: Discovery document — endpoint URLs and the official desktop client_id
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WellKnownDoc" }

  /api/v1/oauth/authorize:
    get:
      security: []
      summary: Start an Authorization Code (+ PKCE) flow
      description: |
        Validates query parameters, stashes them server-side, and redirects
        the browser to `<frontend>/oauth/authorize?req=<opaque>`. PKCE is
        mandatory for every client (including first-party).
      parameters:
        - in: query
          name: response_type
          required: true
          schema: { type: string, enum: [code] }
        - in: query
          name: client_id
          required: true
          schema: { type: string }
        - in: query
          name: redirect_uri
          required: true
          schema: { type: string, format: uri }
        - in: query
          name: scope
          required: true
          schema: { type: string }
        - in: query
          name: state
          required: true
          schema: { type: string, minLength: 8, maxLength: 256 }
        - in: query
          name: code_challenge
          required: true
          schema: { type: string }
        - in: query
          name: code_challenge_method
          schema: { type: string, enum: [S256], default: S256 }
      responses:
        "302":
          description: redirect to the consent SPA

  /api/v1/oauth/authorize/preview:
    get:
      security: []
      summary: Consent-UI metadata fetch
      parameters:
        - in: query
          name: req
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AuthorizePreview" }

  /api/v1/oauth/authorize/decision:
    post:
      summary: Consent-UI decision (allow/deny)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [req, decision]
              properties:
                req: { type: string, format: uuid }
                decision: { type: string, enum: [allow, deny] }
      responses:
        "200":
          description: ok — redirect_url is where the SPA should send the browser
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirect_url: { type: string, format: uri }

  /api/v1/oauth/token:
    post:
      security: []
      summary: Exchange a code, refresh, or device_code for an access token
      description: |
        RFC 6749-shaped token endpoint. Accepts a form-urlencoded body. The
        three supported grants are `authorization_code`, `refresh_token`,
        and `urn:ietf:params:oauth:grant-type:device_code`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type]
              properties:
                grant_type:    { type: string }
                code:          { type: string }
                code_verifier: { type: string }
                redirect_uri:  { type: string, format: uri }
                refresh_token: { type: string }
                device_code:   { type: string }
                client_id:     { type: string }
                client_secret: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthTokenResponse" }
        "400":
          description: OAuth error envelope (see error / error_description)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthError" }

  /api/v1/oauth/device_authorization:
    post:
      security: []
      summary: Start a Device Authorization Grant (RFC 8628)
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [client_id]
              properties:
                client_id: { type: string }
                scope:     { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DeviceCodeResponse" }

  /api/v1/oauth/device/approve:
    post:
      summary: Approve a device flow user_code on behalf of the logged-in user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [approved] }

  /api/v1/oauth/device/deny:
    post:
      summary: Deny a device flow user_code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_code]
              properties:
                user_code: { type: string }
      responses:
        "200":
          description: ok

  /api/v1/oauth/revoke:
    post:
      security: []
      summary: RFC 7009 token revocation
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [token]
              properties:
                token:           { type: string }
                token_type_hint: { type: string, enum: [access_token, refresh_token] }
      responses:
        "200":
          description: revoked or token was already inactive

  /api/v1/oauth/clients/{client_id}:
    get:
      security: []
      summary: Public client metadata (name/logo/homepage)
      parameters:
        - in: path
          name: client_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ClientPublicView" }

  /api/v1/oauth/authorizations:
    get:
      summary: List the caller's granted (user, client) authorizations
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                maxItems: 200
                items: { $ref: "#/components/schemas/AuthorizationView" }

  /api/v1/oauth/authorizations/{id}:
    delete:
      summary: Revoke a granted authorization (also nukes live tokens)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: revoked }

  /api/v1/oauth/apps:
    get:
      summary: List OAuth Apps owned by the caller
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                maxItems: 200
                items: { $ref: "#/components/schemas/OAuthAppView" }
    post:
      summary: Register a new OAuth App
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOAuthAppRequest" }
      responses:
        "201":
          description: created — client_secret is shown exactly once
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreateOAuthAppResponse" }

  /api/v1/oauth/apps/{id}:
    patch:
      summary: Update an OAuth App's metadata
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateOAuthAppRequest" }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthAppView" }
    delete:
      summary: Delete an OAuth App (cascades to authorizations and tokens)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }

  /api/v1/oauth/apps/{id}/reset-secret:
    post:
      summary: Rotate a confidential client's secret (returns the new raw secret once)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  client_secret: { type: string }

  /api/v1/admin/oauth/apps:
    get:
      summary: List every registered OAuth App (admin only)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: array
                maxItems: 1000
                items: { $ref: "#/components/schemas/OAuthAppView" }

  /api/v1/admin/oauth/apps/{id}:
    patch:
      summary: Admin update — toggle is_first_party etc.
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_first_party: { type: boolean }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OAuthAppView" }
    delete:
      summary: Admin delete
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: deleted }

  # ---------------- admin ----------------

  /api/v1/admin/users:
    get:
      summary: List users (admin)
      description: |
        Returns users, pending-first. Requires the caller to be an active
        admin (`is_admin=true`, `approval_status=approved`). Filter by
        `status=pending|approved|rejected` to scope to the approval queue.
      parameters:
        - in: query
          name: status
          required: false
          schema: { type: string, enum: [pending, approved, rejected] }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    maxItems: 100
                    description: |
                      Capped at 100 rows server-side (see
                      `userstore.ListUsers`). When the admin queue grows beyond
                      that, future versions will switch to a cursor-paginated
                      response.
                    items: { $ref: "#/components/schemas/User" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }

  /api/v1/admin/users/{user_id}:
    patch:
      summary: Patch a user (admin)
      description: |
        Approve/reject pending accounts, promote/demote admins, and
        enable/disable accounts. Any combination of fields may be omitted —
        only the ones in the body are applied.
      parameters:
        - in: path
          name: user_id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchUserRequest" }
      responses:
        "200":
          description: updated
          content:
            application/json:
              schema: { $ref: "#/components/schemas/User" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409":
          description: refusing to demote/disable the last active admin
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  # ---------------- orgs ----------------

  /api/v1/orgs:
    get:
      summary: List orgs the caller belongs to
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  orgs:
                    type: array
                    items: { $ref: "#/components/schemas/Org" }
    post:
      summary: Create a new (non-personal) org; caller becomes its owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, minLength: 2, maxLength: 64 }
                display_name: { type: string, maxLength: 128 }
                description: { type: string, maxLength: 512 }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/Org" } } }
        "409": { $ref: "#/components/responses/ConflictError" }

  /api/v1/orgs/{org_slug}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
    get:
      summary: Fetch an org by slug
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/Org" } } }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
    get:
      summary: List projects in an org
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Create a project under an org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, minLength: 2, maxLength: 64 }
                display_name: { type: string }
                description: { type: string }
                visibility: { type: string, enum: [private, internal, public] }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      summary: Fetch a project by slug
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } }
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------- repos ----------------

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      summary: List repos in a project
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  repos:
                    type: array
                    items: { $ref: "#/components/schemas/Repo" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Create a repo (initialises a bare repo on disk via libgit2)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug]
              properties:
                slug: { type: string, minLength: 2, maxLength: 64 }
                display_name: { type: string }
                description: { type: string }
                default_branch: { type: string, default: "main" }
                visibility: { type: string, enum: [private, internal, public] }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/Repo" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
    get:
      summary: Fetch a repo by slug
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/Repo" } } }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/refs:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
    get:
      summary: List refs (branches + tags), backed by libgit2
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  refs:
                    type: array
                    items: { $ref: "#/components/schemas/Ref" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/commits:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - in: query
        name: ref
        schema: { type: string }
        description: Branch, tag, or commit oid; defaults to the default branch.
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    get:
      summary: List commits reachable from ref
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  commits:
                    type: array
                    items: { $ref: "#/components/schemas/Commit" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/tree:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - in: query
        name: ref
        schema: { type: string }
      - in: query
        name: path
        schema: { type: string }
    get:
      summary: List entries in a tree (defaults to repo root at default branch)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  oid: { type: string }
                  entries:
                    type: array
                    items: { $ref: "#/components/schemas/TreeEntry" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/blob:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - in: query
        name: oid
        schema: { type: string }
      - in: query
        name: ref
        schema: { type: string }
      - in: query
        name: path
        schema: { type: string }
    get:
      summary: Read a blob; supply either oid or (ref, path)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  oid: { type: string }
                  size: { type: integer }
                  is_binary: { type: boolean }
                  encoding: { type: string, enum: [utf-8, base64] }
                  content: { type: string }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------- issues ----------------

  /api/v1/orgs/{org_slug}/projects/{project_slug}/issues:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      summary: List issues in a project
      parameters:
        - in: query
          name: state
          schema: { type: string, enum: [open, closed] }
        - in: query
          name: label
          schema: { type: string }
          description: Filter by label name (case-insensitive).
        - in: query
          name: assignee
          schema: { type: string }
          description: User UUID or username.
        - in: query
          name: author
          schema: { type: string }
          description: User UUID or username.
        - in: query
          name: search
          schema: { type: string }
          description: Substring match against title and body (case-insensitive).
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  issues:
                    type: array
                    items: { $ref: "#/components/schemas/Issue" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Create an issue
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateIssueRequest" }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/issues/{number}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/IssueNumber"
    get:
      summary: Get an issue by its per-project number
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    patch:
      summary: Edit an issue (author or org owner/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchIssueRequest" }
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/Issue" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    delete:
      summary: Delete an issue (org owner/admin only)
      responses:
        "204": { description: deleted }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/issues/{number}/comments:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/IssueNumber"
    get:
      summary: List comments on an issue
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/IssueComment" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Post a comment on an issue
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 65536 }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/IssueComment" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/labels:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      summary: List labels in a project
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  labels:
                    type: array
                    items: { $ref: "#/components/schemas/Label" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Create a label (org owner/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, minLength: 1, maxLength: 64 }
                color:
                  type: string
                  description: 6-character hex (with or without leading "#"). Defaults to 888888.
                description: { type: string, maxLength: 256 }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/Label" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/labels/{label_id}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - in: path
        name: label_id
        required: true
        schema: { type: string, format: uuid }
    delete:
      summary: Delete a label (org owner/admin only)
      responses:
        "204": { description: deleted }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------- merge requests ----------------

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
    get:
      summary: List merge requests on a repo
      parameters:
        - in: query
          name: state
          schema: { type: string, enum: [open, merged, closed] }
        - in: query
          name: target_ref
          schema: { type: string }
          description: Exact match on the target ref (e.g. "refs/heads/main").
        - in: query
          name: author
          schema: { type: string }
          description: User UUID or username.
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  merge_requests:
                    type: array
                    items: { $ref: "#/components/schemas/MergeRequest" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Open a merge request
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMergeRequestRequest" }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/MergeRequest" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    get:
      summary: Get a merge request by its per-project number
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/MergeRequest" } } }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    patch:
      summary: Edit title/body (author or org owner/admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchMergeRequestRequest" }
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/MergeRequest" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/diff:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    get:
      summary: Per-file diff between merge base and source tip
      description: |
        For open MRs, the diff is computed from the live source/target refs.
        For merged/closed MRs, the snapshot OIDs recorded at open time are
        used so the historical view stays stable even if the source ref is
        later deleted.

        By default each file entry omits the unified patch text to keep
        responses small; pass `include=patch` to populate it.
      parameters:
        - in: query
          name: include
          schema: { type: string }
          description: |
            Comma-separated optional fields. Currently the only recognised
            token is `patch`, which adds a unified diff string to each file
            entry.
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  base_oid: { type: string }
                  source_oid: { type: string }
                  target_oid: { type: string }
                  files:
                    type: array
                    items: { $ref: "#/components/schemas/MRDiffEntry" }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/commits:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    get:
      summary: Commits reachable from source but not target
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  commits:
                    type: array
                    items: { $ref: "#/components/schemas/Commit" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/merge:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    post:
      summary: Merge an open MR with a chosen strategy
      description: |
        Three strategies are supported. `ff` requires the target to be an
        ancestor of the source; pick `merge-commit` (true 2-parent merge
        commit) or `squash` (single-parent commit with the merged tree)
        when the branches have diverged.

        On a merge conflict the response is 409 and the MR remains open.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MergeMRRequest" }
      responses:
        "200":
          description: merged
          content: { application/json: { schema: { $ref: "#/components/schemas/MergeRequest" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/close:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    post:
      summary: Close an open MR without merging
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/MergeRequest" } } }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/reopen:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    post:
      summary: Reopen a previously closed MR (merged MRs cannot be reopened)
      responses:
        "200":
          description: ok
          content: { application/json: { schema: { $ref: "#/components/schemas/MergeRequest" } } }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
        "409": { $ref: "#/components/responses/ConflictError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/comments:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    get:
      summary: List comments on an MR
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  comments:
                    type: array
                    items: { $ref: "#/components/schemas/MRComment" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Post a comment on an MR
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body: { type: string, minLength: 1, maxLength: 65536 }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/MRComment" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/repos/{repo_slug}/merge-requests/{number}/reviews:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - $ref: "#/components/parameters/RepoSlug"
      - $ref: "#/components/parameters/MRNumber"
    get:
      summary: List reviews on an MR
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items: { $ref: "#/components/schemas/MRReview" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    post:
      summary: Post a review on an MR
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMRReviewRequest" }
      responses:
        "201":
          description: created
          content: { application/json: { schema: { $ref: "#/components/schemas/MRReview" } } }
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/UnauthorizedError" }
        "403": { $ref: "#/components/responses/ForbiddenError" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  # ---------------- Git smart HTTP ----------------

  /{org}/{project}/{repo}.git/info/refs:
    get:
      summary: Git smart HTTP ref advertisement
      security:
        - basicAuth: []
        - {} # public repos may be anonymous
      parameters:
        - in: path
          name: org
          required: true
          schema: { type: string }
        - in: path
          name: project
          required: true
          schema: { type: string }
        - in: path
          name: repo
          required: true
          schema: { type: string }
        - in: query
          name: service
          required: true
          schema: { type: string, enum: [git-upload-pack, git-receive-pack] }
      responses:
        "200":
          description: pkt-line ref advertisement
          content:
            application/x-git-upload-pack-advertisement: {}
            application/x-git-receive-pack-advertisement: {}

  /{org}/{project}/{repo}.git/git-upload-pack:
    post:
      summary: Git smart HTTP upload-pack (clone/fetch)
      security:
        - basicAuth: []
        - {}
      parameters:
        - in: path
          name: org
          required: true
          schema: { type: string }
        - in: path
          name: project
          required: true
          schema: { type: string }
        - in: path
          name: repo
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/x-git-upload-pack-request: {}
      responses:
        "200":
          description: packfile stream

  /{org}/{project}/{repo}.git/git-receive-pack:
    post:
      summary: Git smart HTTP receive-pack (push)
      security:
        - basicAuth: []
      parameters:
        - in: path
          name: org
          required: true
          schema: { type: string }
        - in: path
          name: project
          required: true
          schema: { type: string }
        - in: path
          name: repo
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/x-git-receive-pack-request: {}
      responses:
        "200":
          description: report-status stream

  # ---------------- wiki ----------------

  /api/v1/orgs/{org_slug}/projects/{project_slug}/wiki/pages:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
    get:
      summary: List every Markdown page in the project wiki
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  pages:
                    type: array
                    items: { $ref: "#/components/schemas/WikiPage" }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/wiki/pages/{path}:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - in: path
        name: path
        required: true
        schema: { type: string }
        description: |
          Forward-slash separated path ending in ".md" (e.g. "Home.md",
          "docs/usage.md"). Nested paths are supported up to 8 levels deep.

          The interior "/" separators must be percent-encoded by the client
          so the whole path is delivered as a single path segment. For
          example, `docs/usage.md` is sent as `docs%2Fusage.md`. Servers
          decode the segment once before validating the wiki path.
    get:
      summary: Fetch a single page (raw Markdown + sanitized HTML)
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WikiPageContent" }
        "404": { $ref: "#/components/responses/NotFoundError" }
    put:
      summary: Create or update a page (commits via libgit2)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PutWikiPageRequest" }
      responses:
        "201":
          description: page written
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WikiPageContent" }
        "400": { $ref: "#/components/responses/ValidationError" }
    delete:
      summary: Delete a page (creates a deletion commit)
      responses:
        "204": { description: deleted }
        "404": { $ref: "#/components/responses/NotFoundError" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/wiki/history:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200 }
    get:
      summary: Recent commits on the wiki repo's default branch
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  commits:
                    type: array
                    items: { $ref: "#/components/schemas/GitCommit" }

  # ---------------- insights ----------------

  /api/v1/orgs/{org_slug}/projects/{project_slug}/insights/activity:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - in: query
        name: since
        schema: { type: string }
        description: |
          Time window for the rollup. Accepts "<n>d", "<n>w", "<n>y" or a
          bare integer in seconds. Default 30d.
    get:
      summary: Per-day rollup of issues / MRs / commits across the project
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  days:
                    type: array
                    items: { $ref: "#/components/schemas/ActivityDay" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/insights/contributors:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - in: query
        name: repo
        required: true
        schema: { type: string }
      - in: query
        name: since
        schema: { type: string }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 100 }
    get:
      summary: Top contributors by commit count for a repo over a window
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  contributors:
                    type: array
                    items: { $ref: "#/components/schemas/ContributorStat" }

  /api/v1/orgs/{org_slug}/projects/{project_slug}/insights/languages:
    parameters:
      - $ref: "#/components/parameters/OrgSlug"
      - $ref: "#/components/parameters/ProjectSlug"
      - in: query
        name: repo
        required: true
        schema: { type: string }
      - in: query
        name: ref
        schema: { type: string }
        description: Branch or revspec; defaults to the repo's default branch.
    get:
      summary: Bytes and file counts per detected language across the latest tree
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LanguageStats" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    basicAuth:
      type: http
      scheme: basic
      description: |
        Used by Git CLI only. The "password" is either a personal access token
        (preferred — recognised by the `wlpat_` prefix) or the user's account
        password.

        **Security:** credentials are sent on every request, so basic auth
        MUST be used over HTTPS in production — configure server URLs as
        `https://` and terminate TLS in front of the API. For local
        development against `localhost` plain HTTP is acceptable.

        Operators should prefer personal access tokens (`wlpat_…`) over
        account passwords, and consider OAuth/bearer-token flows for
        non-CLI clients.

  parameters:
    OrgSlug:
      in: path
      name: org_slug
      required: true
      schema: { type: string }
    ProjectSlug:
      in: path
      name: project_slug
      required: true
      schema: { type: string }
    RepoSlug:
      in: path
      name: repo_slug
      required: true
      schema: { type: string }
    IssueNumber:
      in: path
      name: number
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
      description: Per-project monotonically increasing issue number (e.g. 1, 2, 3 ...).
    MRNumber:
      in: path
      name: number
      required: true
      schema: { type: integer, format: int64, minimum: 1 }
      description: Per-project monotonically increasing merge-request number.

  responses:
    UnauthorizedError:
      description: missing or invalid credentials
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    ForbiddenError:
      description: caller lacks permission
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFoundError:
      description: resource not found
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    ConflictError:
      description: resource already exists
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    ValidationError:
      description: request validation failed
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - validation
                - unauthorized
                - forbidden
                - not_found
                - conflict
                - already_exists
                - rate_limited
                - unsupported
                - bad_request
                - internal
                - unavailable
            message: { type: string }
            details: { type: object, additionalProperties: true }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        email: { type: string }
        display_name: { type: string }
        avatar_url:
          type: string
          description: |
            Public URL for the user's uploaded avatar, or empty when they
            haven't uploaded one. The query string is a cache-busting Unix
            timestamp — refetch when the value changes.
        is_admin: { type: boolean }
        is_active: { type: boolean }
        approval_status:
          type: string
          enum: [pending, approved, rejected]
          description: |
            Account approval state. Pending and rejected users cannot log in
            (the login handler returns 403 with the matching message).
        approval_note: { type: string }
        approved_at:   { type: string, format: date-time, nullable: true }
        github_login:  { type: string, description: "GitHub login, set once the account is linked via OAuth." }
        created_at:    { type: string, format: date-time }

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username: { type: string, minLength: 2, maxLength: 64 }
        email:    { type: string, format: email }
        password: { type: string, minLength: 8, maxLength: 256 }
        display_name: { type: string, maxLength: 128 }

    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:    { type: string, description: "username or email" }
        password: { type: string }

    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type:   { type: string, example: Bearer }
        expires_at:   { type: string, format: date-time }
        user:         { $ref: "#/components/schemas/User" }

    PendingAccountResponse:
      type: object
      properties:
        status:  { type: string, enum: [pending, rejected] }
        message: { type: string }
        user:    { $ref: "#/components/schemas/User" }

    OAuthConfirmResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type:   { type: string, example: Bearer }
        expires_at:   { type: string, format: date-time }
        user:         { $ref: "#/components/schemas/User" }
        new_account:  { type: boolean }

    PatchUserRequest:
      type: object
      properties:
        approval_status: { type: string, enum: [pending, approved, rejected] }
        approval_note:   { type: string, maxLength: 512 }
        is_admin:        { type: boolean }
        is_active:       { type: boolean }

    AccessTokenView:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        scopes:
          type: array
          items: { type: string }
        expires_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        token:
          type: string
          description: Raw token value, returned only on creation.

    Org:
      type: object
      properties:
        id: { type: string, format: uuid }
        slug: { type: string }
        display_name: { type: string }
        description: { type: string }
        is_personal: { type: boolean }
        created_at: { type: string, format: date-time }

    OrgRole:
      type: string
      enum: [owner, maintainer, developer, reporter, guest]
      description: |
        Org-level membership role, GitLab-style. owner > maintainer >
        developer > reporter > guest. Permission helpers in internal/auth
        (CanReadOrg / CanWriteRepo / CanModerateContent / CanManageMembers /
        CanAdminOrg) gate every action against this enum.

    InvitableRole:
      type: string
      enum: [maintainer, developer, reporter, guest]
      description: |
        Subset of OrgRole that can be granted by invitation. Owner promotion
        goes through PATCH /orgs/{slug}/members/{user_id} and is restricted
        to existing owners.

    OrgMember:
      type: object
      properties:
        user_id:      { type: string, format: uuid }
        username:     { type: string }
        display_name: { type: string }
        email:        { type: string }
        avatar_url:   { type: string }
        role:         { $ref: "#/components/schemas/OrgRole" }
        joined_at:    { type: string, format: date-time }

    InvitationStatus:
      type: string
      enum: [pending, accepted, revoked, expired]

    OrgInvitation:
      type: object
      properties:
        id:                { type: string, format: uuid }
        org_id:            { type: string, format: uuid }
        org_slug:          { type: string }
        org_display_name:  { type: string }
        inviter:           { $ref: "#/components/schemas/UserRef", nullable: true }
        invitee_user_id:   { type: string, format: uuid, nullable: true }
        invitee_email:     { type: string, nullable: true }
        role:              { $ref: "#/components/schemas/InvitableRole" }
        status:            { $ref: "#/components/schemas/InvitationStatus" }
        expires_at:        { type: string, format: date-time }
        created_at:        { type: string, format: date-time }
        accepted_at:       { type: string, format: date-time, nullable: true }
        token:
          type: string
          description: |
            Raw invitation token. Populated only on the create-invitation
            response — all subsequent reads return the empty string since the
            server stores only the HMAC.
        url:
          type: string
          description: |
            Share URL the inviter should send to the recipient. Populated only
            on the create-invitation response.

    CreateInvitationRequest:
      type: object
      required: [identifier, role]
      properties:
        identifier:
          type: string
          description: |
            Username or email of the invitee. If it contains "@" we treat it
            as an email; otherwise as a username. Existing usernames resolve
            to invitee_user_id; unknown emails are stored as-is and matched
            at accept time.
        role: { $ref: "#/components/schemas/InvitableRole" }
        ttl_hours:
          type: integer
          minimum: 1
          maximum: 720
          description: How long the invitation stays acceptable. Defaults to 168 (7 days).

    PatchMemberRequest:
      type: object
      required: [role]
      properties:
        role: { $ref: "#/components/schemas/OrgRole" }

    AvatarUploadResponse:
      type: object
      properties:
        avatar_url:        { type: string }
        avatar_updated_at: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        org_id: { type: string, format: uuid }
        slug: { type: string }
        display_name: { type: string }
        description: { type: string }
        visibility: { type: string, enum: [private, internal, public] }
        created_at: { type: string, format: date-time }

    Repo:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        slug: { type: string }
        display_name: { type: string }
        description: { type: string }
        default_branch: { type: string }
        visibility: { type: string, enum: [private, internal, public] }
        is_empty: { type: boolean }
        size_bytes: { type: integer, format: int64 }
        created_at: { type: string, format: date-time }

    Ref:
      type: object
      properties:
        name: { type: string }
        oid:  { type: string }
        is_branch: { type: boolean }
        is_tag: { type: boolean }

    TreeEntry:
      type: object
      properties:
        name: { type: string }
        oid:  { type: string }
        filemode: { type: integer }
        kind: { type: string, enum: [blob, tree, submodule, tag, other] }

    Signature:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        when: { type: string, format: date-time }

    Commit:
      type: object
      properties:
        oid: { type: string }
        tree_oid: { type: string }
        author: { $ref: "#/components/schemas/Signature" }
        committer: { $ref: "#/components/schemas/Signature" }
        message: { type: string }
        parents:
          type: array
          items: { type: string }

    UserRef:
      type: object
      description: Lightweight user reference embedded in issue/comment payloads.
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        display_name: { type: string }

    Label:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        name: { type: string }
        color:
          type: string
          description: 6-character hex (no leading "#").
        description: { type: string }
        created_at: { type: string, format: date-time }

    IssueState:
      type: string
      enum: [open, closed]

    Issue:
      type: object
      properties:
        id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        number: { type: integer, format: int64 }
        title: { type: string }
        body: { type: string }
        state: { $ref: "#/components/schemas/IssueState" }
        author: { $ref: "#/components/schemas/UserRef" }
        closed_at: { type: string, format: date-time, nullable: true }
        closed_by: { $ref: "#/components/schemas/UserRef", nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        labels:
          type: array
          items: { $ref: "#/components/schemas/Label" }
        assignees:
          type: array
          items: { $ref: "#/components/schemas/UserRef" }
        comment_count: { type: integer, format: int64 }

    CreateIssueRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 256 }
        body: { type: string, maxLength: 65536 }
        labels:
          type: array
          items: { type: string, format: uuid }
        assignees:
          type: array
          items: { type: string, format: uuid }

    PatchIssueRequest:
      type: object
      description: |
        Patch an issue. Omitted fields are left untouched; arrays (labels,
        assignees) are replaced wholesale when present (use [] to clear).
      properties:
        title: { type: string, minLength: 1, maxLength: 256 }
        body: { type: string, maxLength: 65536 }
        state: { $ref: "#/components/schemas/IssueState" }
        labels:
          type: array
          items: { type: string, format: uuid }
        assignees:
          type: array
          items: { type: string, format: uuid }

    IssueComment:
      type: object
      properties:
        id: { type: string, format: uuid }
        issue_id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/UserRef" }
        body: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    MRState:
      type: string
      enum: [open, merged, closed]

    MergeStrategy:
      type: string
      enum: [ff, merge-commit, squash]

    MergeRequest:
      type: object
      properties:
        id: { type: string, format: uuid }
        repo_id: { type: string, format: uuid }
        project_id: { type: string, format: uuid }
        number: { type: integer, format: int64 }
        title: { type: string }
        body: { type: string }
        state: { $ref: "#/components/schemas/MRState" }
        source_ref: { type: string }
        target_ref: { type: string }
        source_oid_at_open: { type: string }
        target_oid_at_open: { type: string }
        merge_strategy:
          allOf:
            - $ref: "#/components/schemas/MergeStrategy"
          nullable: true
        merge_commit_oid: { type: string, nullable: true }
        author: { $ref: "#/components/schemas/UserRef" }
        merged_by: { $ref: "#/components/schemas/UserRef", nullable: true }
        closed_by: { $ref: "#/components/schemas/UserRef", nullable: true }
        merged_at: { type: string, format: date-time, nullable: true }
        closed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        comment_count: { type: integer, format: int64 }
        review_count: { type: integer, format: int64 }

    CreateMergeRequestRequest:
      type: object
      required: [title, source_ref, target_ref]
      properties:
        title: { type: string, minLength: 1, maxLength: 256 }
        body: { type: string, maxLength: 65536 }
        source_ref:
          type: string
          description: |
            Branch to merge from. Bare names like "feat/x" are accepted and
            promoted to "refs/heads/feat/x".
        target_ref:
          type: string
          description: Branch to merge into.

    PatchMergeRequestRequest:
      type: object
      description: Update title or body. Omitted fields are left untouched.
      properties:
        title: { type: string, minLength: 1, maxLength: 256 }
        body: { type: string, maxLength: 65536 }

    MergeMRRequest:
      type: object
      required: [strategy]
      properties:
        strategy: { $ref: "#/components/schemas/MergeStrategy" }
        message:
          type: string
          maxLength: 65536
          description: |
            Optional commit message override for merge-commit and squash. The
            ff strategy ignores this field — fast-forward updates don't make
            new commits.

    MRComment:
      type: object
      properties:
        id: { type: string, format: uuid }
        mr_id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/UserRef" }
        body: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ReviewState:
      type: string
      enum: [approved, changes_requested, commented]

    MRReview:
      type: object
      properties:
        id: { type: string, format: uuid }
        mr_id: { type: string, format: uuid }
        author: { $ref: "#/components/schemas/UserRef" }
        state: { $ref: "#/components/schemas/ReviewState" }
        body: { type: string }
        created_at: { type: string, format: date-time }

    CreateMRReviewRequest:
      type: object
      required: [state]
      properties:
        state: { $ref: "#/components/schemas/ReviewState" }
        body: { type: string, maxLength: 65536 }

    MRDiffEntry:
      type: object
      properties:
        path: { type: string }
        old_path:
          type: string
          description: Set on renames/copies; otherwise empty.
        status:
          type: string
          enum: [added, modified, deleted, renamed, copied, typechange, other]
        additions: { type: integer }
        deletions: { type: integer }
        patch:
          type: string
          description: |
            Unified diff text for this file. Populated only when the request
            included `?include=patch`.

    # ---------------- Wiki ----------------

    WikiPage:
      type: object
      properties:
        path: { type: string }
        size: { type: integer, format: int64 }
        updated_at: { type: string, format: date-time, nullable: true }

    WikiPageContent:
      type: object
      properties:
        path: { type: string }
        raw: { type: string }
        html:
          type: string
          description: |
            Markdown rendered to HTML via goldmark (GFM) and sanitized through
            bluemonday's UGCPolicy. Safe to render directly into the DOM.
        commit_oid: { type: string }

    PutWikiPageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, maxLength: 1048576 }
        message:
          type: string
          maxLength: 512
          description: Optional commit message. Defaults to "Update <path>".

    GitCommit:
      type: object
      description: A single commit as returned by the libgit2 wrapper.
      properties:
        oid: { type: string }
        tree_oid: { type: string }
        message: { type: string }
        parents:
          type: array
          items: { type: string }
        author:
          type: object
          properties:
            name: { type: string }
            email: { type: string }
            when: { type: string, format: date-time }
        committer:
          type: object
          properties:
            name: { type: string }
            email: { type: string }
            when: { type: string, format: date-time }

    # ---------------- Insights ----------------

    ActivityDay:
      type: object
      properties:
        date: { type: string, description: "YYYY-MM-DD (UTC)" }
        issues_opened: { type: integer, format: int64 }
        issues_closed: { type: integer, format: int64 }
        mrs_opened: { type: integer, format: int64 }
        mrs_merged: { type: integer, format: int64 }
        commits: { type: integer, format: int64 }

    ContributorStat:
      type: object
      properties:
        email: { type: string }
        name: { type: string }
        commits: { type: integer, format: int64 }

    LanguageStats:
      type: object
      properties:
        bytes:
          type: object
          additionalProperties: { type: integer, format: int64 }
          description: |
            Total UTF-8 bytes per detected language across the walked tree.
            Binary blobs are skipped; languages are inferred from file
            extension and a small basename map (Dockerfile, Makefile, ...).
        files:
          type: object
          additionalProperties: { type: integer, format: int64 }
          description: File counts per language.
        truncated:
          type: boolean
          description: |
            True when the walker hit its blob cap before reaching every
            file. In that case the byte and file counts are a lower bound,
            not an exact total. Omitted (treated as false) when the walk
            completed in full.

    # ---------------- SSH ----------------

    SSHKey:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        fingerprint:
          type: string
          description: SHA256:... fingerprint as ssh-keygen prints.
        public_key:
          type: string
          description: |
            Canonical authorized_keys line (key type + base64 blob, no
            comment). Always normalised on insert.
        created_at: { type: string, format: date-time }
        last_used_at:
          type: string
          format: date-time
          nullable: true

    CreateSSHKeyRequest:
      type: object
      required: [title, public_key]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 128
          description: Human label for the key (e.g. "laptop", "ci-runner").
        public_key:
          type: string
          minLength: 1
          maxLength: 8192
          description: |
            One-line OpenSSH public key (the contents of `~/.ssh/id_*.pub`).
            Accepts ssh-rsa, ssh-ed25519, ecdsa-sha2-*; rejects everything
            else with 400.



    # ---------------------------------------------------------------------------
    # OAuth Provider schemas
    # ---------------------------------------------------------------------------
    WellKnownDoc:
      type: object
      description: |
        IdP discovery document. Public, returned with `Cache-Control: public,
        max-age=300` so a desktop client can poll it cheaply on first
        connection. Esperanta uses `desktop_official_client_id` to skip the
        manual client_id step on a self-hosted instance.
      properties:
        issuer:
          type: string
          format: uri
          description: Absolute origin of this instance.
        desktop_official_client_id:
          type: string
          description: client_id of the seeded first-party desktop app.
        authorization_endpoint:        { type: string, format: uri }
        token_endpoint:                { type: string, format: uri }
        device_authorization_endpoint: { type: string, format: uri }
        revocation_endpoint:           { type: string, format: uri }
        frontend_device_verification_uri:
          type: string
          format: uri
          description: |
            URL of the SPA page where a user enters their user_code (i.e.
            `verification_uri` in RFC 8628 terms).
        scopes_supported:
          type: array
          maxItems: 64
          items: { type: string }
        response_types_supported:
          type: array
          maxItems: 8
          items: { type: string }
        grant_types_supported:
          type: array
          maxItems: 8
          items: { type: string }
        code_challenge_methods_supported:
          type: array
          maxItems: 4
          items: { type: string, enum: [S256] }

    ClientPublicView:
      type: object
      description: Public, unauthenticated view of an OAuth client.
      properties:
        client_id:      { type: string }
        name:           { type: string }
        homepage_url:   { type: string, format: uri }
        description:    { type: string }
        logo_url:       { type: string, format: uri }
        is_first_party: { type: boolean }

    AuthorizePreview:
      type: object
      description: Payload the consent SPA fetches via /authorize/preview.
      properties:
        req:    { type: string, format: uuid }
        client: { $ref: "#/components/schemas/ClientPublicView" }
        scopes_requested:
          type: array
          maxItems: 64
          items: { type: string }
        expires_at: { type: string, format: date-time }

    OAuthTokenResponse:
      type: object
      description: RFC 6749 §5.1 token response.
      properties:
        access_token:  { type: string }
        token_type:    { type: string, enum: [Bearer] }
        expires_in:    { type: integer }
        refresh_token: { type: string }
        scope:         { type: string, description: "Space-separated granted scopes." }

    OAuthError:
      type: object
      description: RFC 6749 §5.2 error envelope (distinct from the internal API envelope).
      properties:
        error: { type: string }
        error_description: { type: string }

    DeviceCodeResponse:
      type: object
      description: RFC 8628 §3.2 response for /device_authorization.
      properties:
        device_code:               { type: string }
        user_code:                 { type: string, description: "Human-typable code (shaped like ABCD-1234)." }
        verification_uri:          { type: string, format: uri }
        verification_uri_complete: { type: string, format: uri }
        expires_in:                { type: integer }
        interval:                  { type: integer }

    AuthorizationView:
      type: object
      description: |
        A row in /api/v1/oauth/authorizations — the durable consent record
        joining the user, the client they granted, and the scopes granted.
      properties:
        id:              { type: string, format: uuid }
        client_id:       { type: string, description: "Public client_id string, not the internal UUID." }
        client_name:     { type: string }
        client_logo_url: { type: string, format: uri }
        is_first_party:  { type: boolean }
        scopes:
          type: array
          maxItems: 64
          items: { type: string }
        granted_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    OAuthAppView:
      type: object
      description: |
        OAuth App as seen by its owner or by an admin. client_secret is NOT
        included — it appears only in CreateOAuthAppResponse and the
        reset-secret response, both of which return the raw secret exactly
        once.
      properties:
        id:              { type: string, format: uuid }
        client_id:       { type: string }
        name:            { type: string }
        homepage_url:    { type: string, format: uri }
        description:     { type: string }
        logo_url:        { type: string, format: uri }
        is_first_party:  { type: boolean }
        is_confidential: { type: boolean }
        redirect_uris:
          type: array
          maxItems: 8
          items: { type: string, format: uri }
        default_scopes:
          type: array
          maxItems: 20
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateOAuthAppRequest:
      type: object
      required: [name, redirect_uris, default_scopes]
      properties:
        name:            { type: string, minLength: 1, maxLength: 128 }
        homepage_url:    { type: string, format: uri }
        description:     { type: string, maxLength: 512 }
        logo_url:        { type: string, format: uri }
        is_confidential: { type: boolean, description: "Public (false) by default — fits SPA / desktop / CLI apps that cannot keep a secret." }
        redirect_uris:
          type: array
          minItems: 1
          maxItems: 8
          items: { type: string, format: uri }
        default_scopes:
          type: array
          minItems: 1
          maxItems: 20
          items: { type: string }

    CreateOAuthAppResponse:
      type: object
      properties:
        app: { $ref: "#/components/schemas/OAuthAppView" }
        client_id: { type: string }
        client_secret:
          type: string
          description: |
            Raw secret. Shown exactly once on create / reset; the server
            stores only HMAC. If you lose it, you must call /reset-secret.
            Public clients (is_confidential=false) get an empty string here.

    UpdateOAuthAppRequest:
      type: object
      properties:
        name:         { type: string, minLength: 1, maxLength: 128 }
        homepage_url: { type: string, format: uri }
        description:  { type: string, maxLength: 512 }
        logo_url:     { type: string, format: uri }
        redirect_uris:
          type: array
          minItems: 1
          maxItems: 8
          items: { type: string, format: uri }
        default_scopes:
          type: array
          minItems: 1
          maxItems: 20
          items: { type: string }
